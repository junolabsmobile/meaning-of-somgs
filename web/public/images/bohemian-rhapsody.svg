<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stage-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0008"/>
      <stop offset="100%" stop-color="#1a0010"/>
    </linearGradient>
    <linearGradient id="curtain-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a0015"/>
      <stop offset="100%" stop-color="#8b0020"/>
    </linearGradient>
    <linearGradient id="curtain-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b0020"/>
      <stop offset="100%" stop-color="#5a0015"/>
    </linearGradient>
    <radialGradient id="spotlight-grad" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#fffae0" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffe090" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffe090" stop-opacity="0"/>
    </radialGradient>
    <filter id="spotlight-blur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Stage background -->
  <rect width="400" height="300" fill="url(#stage-bg)"/>

  <!-- Spotlight cone (blurred) -->
  <polygon points="200,0 100,300 300,300" fill="url(#spotlight-grad)" filter="url(#spotlight-blur)" opacity="0.7"/>

  <!-- Spotlight cone (crisp) -->
  <polygon points="200,0 115,300 285,300" fill="url(#spotlight-grad)" opacity="0.3"/>

  <!-- Stage floor -->
  <rect x="0" y="255" width="400" height="45" fill="#1a0510"/>
  <!-- Stage floor boards -->
  <g stroke="#2a0818" stroke-width="1" opacity="0.6">
    <line x1="0" y1="265" x2="400" y2="265"/>
    <line x1="0" y1="275" x2="400" y2="275"/>
    <line x1="0" y1="285" x2="400" y2="285"/>
    <line x1="60" y1="255" x2="60" y2="300"/>
    <line x1="120" y1="255" x2="120" y2="300"/>
    <line x1="180" y1="255" x2="180" y2="300"/>
    <line x1="240" y1="255" x2="240" y2="300"/>
    <line x1="300" y1="255" x2="300" y2="300"/>
    <line x1="360" y1="255" x2="360" y2="300"/>
  </g>

  <!-- Left curtain -->
  <path d="M 0 0 L 100 0 L 110 300 L 0 300 Z" fill="url(#curtain-left)"/>
  <!-- Curtain folds left -->
  <path d="M 15 0 Q 30 60 20 120 Q 35 180 25 240 Q 30 270 25 300" stroke="#6a0018" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 40 0 Q 55 50 45 100 Q 60 160 48 220 Q 52 255 48 300" stroke="#6a0018" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 70 0 Q 82 40 74 90 Q 85 145 76 195 Q 82 225 78 300" stroke="#7a001e" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Right curtain -->
  <path d="M 400 0 L 300 0 L 290 300 L 400 300 Z" fill="url(#curtain-right)"/>
  <!-- Curtain folds right -->
  <path d="M 385 0 Q 370 60 380 120 Q 365 180 375 240 Q 370 270 375 300" stroke="#6a0018" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 360 0 Q 345 50 355 100 Q 340 160 352 220 Q 348 255 352 300" stroke="#6a0018" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 330 0 Q 318 40 326 90 Q 315 145 324 195 Q 318 225 322 300" stroke="#7a001e" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Curtain top valance -->
  <path d="M 0 0 L 400 0 L 400 35 Q 380 55 360 35 Q 340 15 320 35 Q 300 55 280 35 Q 260 15 240 35 Q 220 55 200 35 Q 180 15 160 35 Q 140 55 120 35 Q 100 15 80 35 Q 60 55 40 35 Q 20 15 0 35 Z" fill="#6a0018"/>

  <!-- Tragedy mask (left) -->
  <g transform="translate(118, 100)">
    <!-- Mask face -->
    <ellipse cx="0" cy="0" rx="38" ry="45" fill="#c8a44a" stroke="#8a6a20" stroke-width="1.5"/>
    <!-- Eye holes -->
    <ellipse cx="-12" cy="-8" rx="8" ry="10" fill="#0a0008"/>
    <ellipse cx="12" cy="-8" rx="8" ry="10" fill="#0a0008"/>
    <!-- Downturned mouth (tragedy) -->
    <path d="M -15 18 Q 0 10 15 18" stroke="#5a3010" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Tear drops -->
    <ellipse cx="-12" cy="8" rx="3" ry="5" fill="#4488cc" opacity="0.8"/>
    <ellipse cx="12" cy="8" rx="3" ry="5" fill="#4488cc" opacity="0.8"/>
    <!-- Eyebrows (sad) -->
    <path d="M -20 -20 Q -12 -26 -4 -20" stroke="#5a3010" stroke-width="2" fill="none"/>
    <path d="M 4 -20 Q 12 -26 20 -20" stroke="#5a3010" stroke-width="2" fill="none"/>
    <!-- Mask forehead decoration -->
    <path d="M -15 -38 Q 0 -50 15 -38" stroke="#d4b050" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Comedy mask (right) -->
  <g transform="translate(282, 95)">
    <!-- Mask face -->
    <ellipse cx="0" cy="0" rx="38" ry="45" fill="#e8e0b0" stroke="#a09040" stroke-width="1.5"/>
    <!-- Eye holes -->
    <ellipse cx="-12" cy="-8" rx="8" ry="10" fill="#0a0008"/>
    <ellipse cx="12" cy="-8" rx="8" ry="10" fill="#0a0008"/>
    <!-- Upturned mouth (comedy) -->
    <path d="M -15 12 Q 0 28 15 12" stroke="#5a3010" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Rosy cheeks -->
    <ellipse cx="-18" cy="5" rx="8" ry="6" fill="#e8704a" opacity="0.4"/>
    <ellipse cx="18" cy="5" rx="8" ry="6" fill="#e8704a" opacity="0.4"/>
    <!-- Eyebrows (happy) -->
    <path d="M -20 -22 Q -12 -30 -4 -22" stroke="#5a3010" stroke-width="2" fill="none"/>
    <path d="M 4 -22 Q 12 -30 20 -22" stroke="#5a3010" stroke-width="2" fill="none"/>
    <!-- Mask jester points on top -->
    <path d="M -10 -42 L -5 -55 L 0 -42" fill="#c8a44a" opacity="0.8"/>
    <path d="M 0 -42 L 5 -55 L 10 -42" fill="#e8e0b0" opacity="0.8"/>
  </g>

  <!-- Spotlight source indicator (top center) -->
  <circle cx="200" cy="5" r="8" fill="#fffae0" opacity="0.9"/>
  <circle cx="200" cy="5" r="12" fill="#ffe090" opacity="0.3"/>
</svg>
