<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="haze-center" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#cc44ff" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#8822cc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#110022" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="wave1" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#dd55ff" stop-opacity="0"/>
      <stop offset="80%" stop-color="#9933cc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9933cc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wave2" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#bb44ee" stop-opacity="0"/>
      <stop offset="80%" stop-color="#7722bb" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7722bb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wave3" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#aa33dd" stop-opacity="0"/>
      <stop offset="80%" stop-color="#661aaa" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#661aaa" stop-opacity="0"/>
    </radialGradient>
    <filter id="haze-blur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="wave-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="400" height="300" fill="#06000f"/>

  <!-- Background glow -->
  <ellipse cx="200" cy="165" rx="180" ry="130" fill="url(#haze-center)" filter="url(#haze-blur)"/>

  <!-- Concentric wave rings -->
  <!-- Ring 1 - innermost -->
  <ellipse cx="200" cy="165" rx="30" ry="22" fill="none" stroke="#ee66ff" stroke-width="3" opacity="0.9"/>
  <!-- Ring 2 -->
  <ellipse cx="200" cy="165" rx="55" ry="40" fill="none" stroke="#dd55ee" stroke-width="2.5" opacity="0.8"/>
  <!-- Ring 3 -->
  <ellipse cx="200" cy="165" rx="82" ry="58" fill="none" stroke="#cc44dd" stroke-width="2" opacity="0.7"/>
  <!-- Ring 4 -->
  <ellipse cx="200" cy="165" rx="110" ry="78" fill="none" stroke="#bb33cc" stroke-width="2" opacity="0.6"/>
  <!-- Ring 5 -->
  <ellipse cx="200" cy="165" rx="140" ry="98" fill="none" stroke="#aa22bb" stroke-width="1.5" opacity="0.5"/>
  <!-- Ring 6 - outermost -->
  <ellipse cx="200" cy="165" rx="172" ry="120" fill="none" stroke="#8811aa" stroke-width="1.5" opacity="0.35"/>
  <!-- Extra outer rings (fading) -->
  <ellipse cx="200" cy="165" rx="195" ry="138" fill="none" stroke="#770099" stroke-width="1" opacity="0.2"/>

  <!-- Guitarist silhouette -->
  <g transform="translate(200, 165)" fill="#06000f">
    <!-- Body -->
    <ellipse cx="0" cy="30" rx="14" ry="20"/>
    <!-- Head -->
    <circle cx="0" cy="5" r="10"/>
    <!-- Left arm (strumming) -->
    <path d="M -14 25 Q -30 30 -38 45" stroke="#06000f" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Right arm (fret) -->
    <path d="M 14 22 Q 28 15 40 10" stroke="#06000f" stroke-width="9" fill="none" stroke-linecap="round"/>
    <!-- Guitar body -->
    <ellipse cx="-22" cy="50" rx="14" ry="18" transform="rotate(-20 -22 50)"/>
    <!-- Guitar neck -->
    <rect x="5" y="5" width="5" height="35" rx="2" transform="rotate(-25 5 5)"/>
    <!-- Legs -->
    <rect x="-8" y="48" width="8" height="25" rx="3"/>
    <rect x="2" y="48" width="8" height="22" rx="3"/>
  </g>

  <!-- Smoke wisps -->
  <path d="M 160 280 Q 155 250 165 220 Q 170 195 160 170 Q 155 150 162 130" stroke="#9933cc" stroke-width="3" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M 240 285 Q 248 255 238 225 Q 232 200 242 175 Q 250 152 240 132" stroke="#bb44ee" stroke-width="2.5" fill="none" opacity="0.35" stroke-linecap="round"/>
  <path d="M 130 290 Q 125 260 138 238 Q 148 218 135 195" stroke="#8822cc" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>
  <path d="M 270 288 Q 280 258 268 236 Q 258 215 272 192" stroke="#aa33dd" stroke-width="2" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- Central bright glow -->
  <ellipse cx="200" cy="165" rx="25" ry="18" fill="#cc44ff" opacity="0.25" filter="url(#wave-blur)"/>

  <!-- Star-like sparkles in the haze -->
  <circle cx="145" cy="130" r="2" fill="#ee88ff" opacity="0.7"/>
  <circle cx="258" cy="118" r="1.5" fill="#dd77ee" opacity="0.6"/>
  <circle cx="120" cy="195" r="1.8" fill="#cc66dd" opacity="0.5"/>
  <circle cx="285" cy="210" r="1.5" fill="#ee88ff" opacity="0.6"/>
  <circle cx="165" cy="240" r="1.2" fill="#bb55cc" opacity="0.4"/>
  <circle cx="240" cy="245" r="1.5" fill="#dd77ee" opacity="0.5"/>
</svg>
