<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="night-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040208"/>
      <stop offset="60%" stop-color="#0a0510"/>
      <stop offset="100%" stop-color="#1a0505"/>
    </linearGradient>
    <linearGradient id="fire-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#cc2200"/>
      <stop offset="40%" stop-color="#ff6600"/>
      <stop offset="75%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ffdd00" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="fire-glow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="road-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0508"/>
      <stop offset="100%" stop-color="#1a1018"/>
    </linearGradient>
    <filter id="fire-glow-filter">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="flame-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Night sky -->
  <rect width="400" height="300" fill="url(#night-bg)"/>

  <!-- Stars -->
  <circle cx="40" cy="20" r="1" fill="white" opacity="0.6"/>
  <circle cx="80" cy="10" r="1.3" fill="white" opacity="0.5"/>
  <circle cx="130" cy="25" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="270" cy="15" r="1.1" fill="white" opacity="0.5"/>
  <circle cx="330" cy="28" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="375" cy="12" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="170" cy="18" r="0.7" fill="white" opacity="0.4"/>

  <!-- Fire glow on horizon -->
  <ellipse cx="200" cy="160" rx="220" ry="80" fill="url(#fire-glow)" filter="url(#fire-glow-filter)" opacity="0.8"/>

  <!-- Distant landscape / hills silhouette -->
  <path d="M 0 165 Q 60 140 120 158 Q 160 148 200 155 Q 240 148 280 158 Q 330 140 400 162 L 400 300 L 0 300 Z" fill="#0d0808"/>

  <!-- Flames on the horizon - back layer (blurred) -->
  <g filter="url(#flame-blur)" opacity="0.7">
    <path d="M 100 162 Q 108 130 115 115 Q 120 105 112 90 Q 130 110 125 140 Q 135 118 145 100 Q 148 85 140 72 Q 158 95 152 125 Q 160 108 168 92 Q 172 78 165 62 Q 182 82 178 115 Q 185 98 192 80 Q 196 65 188 50 Q 208 72 202 108 Q 210 88 218 70 Q 222 55 215 42 Q 234 65 228 100 Q 236 82 245 65 Q 250 50 243 38 Q 260 62 254 95 Q 262 75 270 58 Q 274 44 267 32 Q 284 56 278 88 Q 288 68 298 52 Q 310 140 300 162 Z" fill="url(#fire-grad)"/>
  </g>

  <!-- Flames - main layer -->
  <path d="M 80 162 Q 90 132 98 112 Q 104 95 96 78 Q 118 100 110 132 Q 122 110 132 90 Q 138 74 130 58 Q 150 82 144 115 Q 155 94 164 75 Q 169 60 162 44 Q 182 68 175 105 Q 185 84 194 65 Q 200 48 192 33 Q 215 58 208 98 Q 218 75 228 56 Q 234 40 226 25 Q 248 52 240 90 Q 252 66 262 47 Q 268 32 260 18 Q 280 44 272 82 Q 285 58 295 40 Q 302 26 295 14 Q 314 40 306 76 Q 320 155 310 162 Z" fill="url(#fire-grad)"/>

  <!-- Flame tips (bright yellow) -->
  <g opacity="0.9">
    <ellipse cx="115" cy="90" rx="6" ry="18" fill="#ffee60" transform="rotate(-5 115 90)"/>
    <ellipse cx="145" cy="75" rx="5" ry="14" fill="#ffee60" transform="rotate(8 145 75)"/>
    <ellipse cx="174" cy="65" rx="5" ry="16" fill="#ffe040" transform="rotate(-3 174 65)"/>
    <ellipse cx="200" cy="50" rx="6" ry="20" fill="#fff060" transform="rotate(5 200 50)"/>
    <ellipse cx="228" cy="42" rx="5" ry="16" fill="#ffee60" transform="rotate(-8 228 42)"/>
    <ellipse cx="255" cy="30" rx="6" ry="22" fill="#fff080" transform="rotate(3 255 30)"/>
    <ellipse cx="282" cy="42" rx="5" ry="16" fill="#ffee60" transform="rotate(-5 282 42)"/>
    <ellipse cx="305" cy="55" rx="5" ry="14" fill="#ffdd40" transform="rotate(6 305 55)"/>
  </g>

  <!-- Road surface -->
  <path d="M 0 300 L 75 162 L 325 162 L 400 300 Z" fill="url(#road-grad)"/>

  <!-- Road center dashes (perspective) -->
  <g fill="#888870" opacity="0.8">
    <!-- Farthest (smallest) -->
    <rect x="196" y="168" width="8" height="4" rx="1"/>
    <rect x="194" y="178" width="12" height="6" rx="1"/>
    <rect x="191" y="193" width="18" height="8" rx="1"/>
    <rect x="187" y="213" width="26" height="10" rx="1"/>
    <rect x="181" y="238" width="38" height="12" rx="1"/>
    <rect x="172" y="268" width="56" height="14" rx="1"/>
  </g>

  <!-- Road edge lines -->
  <line x1="75" y1="162" x2="0" y2="300" stroke="#886644" stroke-width="2.5" opacity="0.5"/>
  <line x1="325" y1="162" x2="400" y2="300" stroke="#886644" stroke-width="2.5" opacity="0.5"/>

  <!-- Road surface cracks/texture -->
  <g stroke="#0d0810" stroke-width="1" opacity="0.4">
    <path d="M 120 220 Q 130 225 140 218"/>
    <path d="M 260 235 Q 270 230 282 238"/>
    <path d="M 150 270 Q 165 275 175 268"/>
    <path d="M 225 280 Q 238 275 248 282"/>
  </g>
</svg>
