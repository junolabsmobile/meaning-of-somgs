<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cold-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06101a"/>
      <stop offset="100%" stop-color="#0a1825"/>
    </linearGradient>
    <linearGradient id="glass-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a0c8e0" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#c0dff0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#80b0d0" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glass-blur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <filter id="silhouette-blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="cold-light" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#80c8ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#80c8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Cold dark background -->
  <rect width="400" height="300" fill="url(#cold-bg)"/>

  <!-- Cold light from behind glass -->
  <ellipse cx="200" cy="130" rx="140" ry="100" fill="url(#cold-light)" filter="url(#glass-blur)"/>

  <!-- Silhouette figure (blurred, behind glass) -->
  <g filter="url(#silhouette-blur)" opacity="0.7">
    <!-- Head -->
    <circle cx="200" cy="90" r="28" fill="#1a3040"/>
    <!-- Body -->
    <ellipse cx="200" cy="165" rx="32" ry="48" fill="#152535"/>
    <!-- Shoulders/arms -->
    <path d="M 168 140 Q 140 155 130 175" stroke="#152535" stroke-width="22" fill="none" stroke-linecap="round"/>
    <path d="M 232 140 Q 260 155 270 175" stroke="#152535" stroke-width="22" fill="none" stroke-linecap="round"/>
    <!-- Legs (partial) -->
    <rect x="178" y="210" width="18" height="55" rx="8" fill="#152535"/>
    <rect x="202" y="210" width="18" height="50" rx="8" fill="#152535"/>
  </g>

  <!-- Frosted glass panel -->
  <rect x="60" y="0" width="280" height="300" fill="url(#glass-grad)" rx="0"/>

  <!-- Glass texture - horizontal streaks -->
  <g opacity="0.12" stroke="#c0e0f0" stroke-width="1">
    <line x1="60" y1="18" x2="340" y2="18"/>
    <line x1="60" y1="36" x2="340" y2="36"/>
    <line x1="60" y1="54" x2="340" y2="54"/>
    <line x1="60" y1="72" x2="340" y2="72"/>
    <line x1="60" y1="90" x2="340" y2="90"/>
    <line x1="60" y1="108" x2="340" y2="108"/>
    <line x1="60" y1="126" x2="340" y2="126"/>
    <line x1="60" y1="144" x2="340" y2="144"/>
    <line x1="60" y1="162" x2="340" y2="162"/>
    <line x1="60" y1="180" x2="340" y2="180"/>
    <line x1="60" y1="198" x2="340" y2="198"/>
    <line x1="60" y1="216" x2="340" y2="216"/>
    <line x1="60" y1="234" x2="340" y2="234"/>
    <line x1="60" y1="252" x2="340" y2="252"/>
    <line x1="60" y1="270" x2="340" y2="270"/>
    <line x1="60" y1="288" x2="340" y2="288"/>
  </g>

  <!-- Glass texture - slight vertical irregularities -->
  <g opacity="0.06" stroke="#d0e8f8" stroke-width="2">
    <path d="M 100 0 Q 105 50 98 100 Q 103 150 99 200 Q 104 250 100 300" fill="none"/>
    <path d="M 155 0 Q 160 70 153 140 Q 158 210 154 280 Q 156 290 155 300" fill="none"/>
    <path d="M 210 0 Q 215 60 208 120 Q 213 180 209 240 Q 214 270 210 300" fill="none"/>
    <path d="M 265 0 Q 270 55 263 110 Q 268 165 264 220 Q 269 260 265 300" fill="none"/>
    <path d="M 315 0 Q 320 65 313 130 Q 318 195 314 260 Q 319 280 315 300" fill="none"/>
  </g>

  <!-- Rain/condensation drops on glass -->
  <g fill="#a0c8e0" opacity="0.55">
    <ellipse cx="95" cy="45" rx="3" ry="8"/>
    <ellipse cx="92" cy="58" rx="2" ry="5"/>
    <ellipse cx="130" cy="80" rx="3" ry="9"/>
    <ellipse cx="128" cy="94" rx="2" ry="6"/>
    <ellipse cx="175" cy="35" rx="2.5" ry="7"/>
    <ellipse cx="172" cy="47" rx="2" ry="5"/>
    <ellipse cx="220" cy="60" rx="3" ry="10"/>
    <ellipse cx="218" cy="75" rx="2" ry="6"/>
    <ellipse cx="265" cy="42" rx="2.5" ry="7"/>
    <ellipse cx="263" cy="54" rx="2" ry="4"/>
    <ellipse cx="300" cy="88" rx="3" ry="9"/>
    <ellipse cx="298" cy="102" rx="2" ry="6"/>
    <ellipse cx="110" cy="160" rx="2.5" ry="8"/>
    <ellipse cx="108" cy="173" rx="2" ry="5"/>
    <ellipse cx="245" cy="145" rx="3" ry="9"/>
    <ellipse cx="243" cy="159" rx="2" ry="6"/>
    <ellipse cx="315" cy="190" rx="2.5" ry="7"/>
    <ellipse cx="313" cy="202" rx="2" ry="5"/>
    <ellipse cx="145" cy="220" rx="3" ry="10"/>
    <ellipse cx="143" cy="235" rx="2" ry="6"/>
    <ellipse cx="285" cy="240" rx="2.5" ry="8"/>
    <ellipse cx="283" cy="253" rx="2" ry="5"/>
    <ellipse cx="190" cy="260" rx="3" ry="9"/>
    <ellipse cx="188" cy="274" rx="2" ry="6"/>
  </g>

  <!-- Glass edge reflections -->
  <rect x="60" y="0" width="4" height="300" fill="white" opacity="0.15"/>
  <rect x="336" y="0" width="4" height="300" fill="white" opacity="0.08"/>

  <!-- Cold blue tint overlay on glass -->
  <rect x="60" y="0" width="280" height="300" fill="#4488cc" opacity="0.05"/>
</svg>
